apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skill-match
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - skill-match.lab.sspcloud.fr
  rules:
  - host: skill-match.lab.sspcloud.fr
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 8000

      - path: /
        pathType: Prefix
        backend:
          service:
            name: ui-service
            port:
              number: 8501
